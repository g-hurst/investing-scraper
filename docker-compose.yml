services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: investing_scraper
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d investing_scraper"]
      interval: 5s
      retries: 5

  api:
    image: investing-scraper
    build:
      context: .
      dockerfile: Dockerfile
    shm_size: '256mb'
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scraper:scraper@postgres:5432/investing_scraper
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
